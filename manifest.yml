# Secrets injected from AWS SSM Parameter Store into the ECS container.
# Path convention: /copilot/cmm-backend/<environment>/secrets/<name>
# Add new secrets here — no Terraform changes needed.
secrets:
  - SUPABASE_URL
  - SUPABASE_KEY
  - SUPABASE_SERVICE_ROLE_KEY
  - AWS_ACCESS_KEY_ID
  - AWS_SECRET_ACCESS_KEY
  - S3_BUCKET_NAME
  - DATABASE_URL
  - AIRTABLE_API_KEY
  - AIRTABLE_BASE_ID
  - AIRTABLE_ASSET_BASE_ID
  - AWS_REGION
  - FRONTEND_URL
  - BACKEND_URL
  - WORDPRESS_APPLICATION_PASSWORD
  - ZOOM_ACCOUNT_ID
  - ZOOM_CLIENT_ID
  - ZOOM_CLIENT_SECRET
  - OPENAI_API_KEY
